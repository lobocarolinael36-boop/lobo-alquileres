services:
  postgres:
    image: postgres:16-alpine
    container_name: lobo_db
    environment:
      POSTGRES_DB: lobo_alquileres
      POSTGRES_USER: lobo_user
      POSTGRES_PASSWORD: lobo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lobo_user -d lobo_alquileres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: lobo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lobo.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
