# Railway — Lobo Alquileres Backend
# Documentación: https://docs.railway.com/reference/config-as-code

[build]
  # Usar el Dockerfile de la raíz del repo
  builder = "dockerfile"

[deploy]
  # Spring Boot expone /actuator/health — Railway lo usa para saber cuándo está listo
  healthcheckPath    = "/actuator/health"
  healthcheckTimeout = 300
  restartPolicyType  = "on_failure"
  restartPolicyMaxRetries = 3
